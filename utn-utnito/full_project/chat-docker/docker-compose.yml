services:
  chat-core-service:
    profiles:
      - full
    build:
      context: ../backend/chat-core-service
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-utn-utnito}-chat-core-service
    ports:
      - "${CORE_SERVICE_PORT:-4012}:3001"
    environment:
      APP_NAME: utn-utnito-chat-core-service
      APP_PORT: 3001
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      AI_ON_ERROR_FALLBACK: ${AI_ON_ERROR_FALLBACK:-mock}
      AI_ASSISTANT_NAME: ${AI_ASSISTANT_NAME:-UTNito}
      AI_ASSISTANT_DESCRIPTION: ${AI_ASSISTANT_DESCRIPTION:-an AI assistant for a university programming course}
      AI_ASSISTANT_PERSONALITY: ${AI_ASSISTANT_PERSONALITY:-friendly, clear, and practical programming mentor}
      AI_CONTEXT_MAX_PAIRS: ${AI_CONTEXT_MAX_PAIRS:-5}
      AI_N8N_WEBHOOK_URL: ${AI_N8N_WEBHOOK_URL:-http://chat-n8n:5678/webhook/utnito-prompt-processing}
      AI_N8N_TIMEOUT_MS: ${AI_N8N_TIMEOUT_MS:-15000}
    networks:
      - utn-utnito-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  chat-n8n:
    image: n8nio/n8n:latest
    container_name: ${COMPOSE_PROJECT_NAME:-utn-utnito}-chat-n8n
    ports:
      - "${N8N_PORT:-5690}:5678"
    environment:
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-utn_ai_admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-utn_ai_admin_password}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-America/Argentina/Buenos_Aires}
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      N8N_RUNNERS_ENABLED: "true"
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - utn-utnito-network
    restart: unless-stopped

  chat-frontend:
    profiles:
      - full
    build:
      context: ../frontend/chat-app
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-utn-utnito}-chat-frontend
    ports:
      - "${FRONTEND_PORT:-4300}:80"
    depends_on:
      chat-core-service:
        condition: service_healthy
    networks:
      - utn-utnito-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  n8n-data:
    name: ${COMPOSE_PROJECT_NAME:-utn-utnito}-n8n-data

networks:
  utn-utnito-network:
    name: ${COMPOSE_PROJECT_NAME:-utn-utnito}-network
